<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="frontend/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <article id="notes-content" class="notes-theme-dark">
    <h3>Test Heading</h3>
    <p>Test paragraph.</p>

    }, 1000);
  </script>
</body>
</html>
